# Music Library Cleanup Configuration
# Primary configuration file for the orchestration system

# Library settings
library:
  root: "/path/to/music"
  backup_enabled: true
  backup_path: "D:/music_backup"

# Music import (bring songs/albums in from an external source, de-dupe by audio
# quality at the TRACK level). Source is left intact (copy only). A NEW album is
# imported whole; for an EXISTING album, each source track that is higher audio
# quality UPGRADES the matching track and each missing track is ADDED (no track is
# ever lost). Quality: lossless > lossy; then bit-depth x sample-rate; then bitrate.
# Used by `cli.py import` / /import-music.
import:
  # Set this to your iTunes Music backup, or pass the source on the command line:
  #   python cli.py import "//your-nas/backups/iTunes/Music" --dest "//your-nas/music"
  itunes_source: "/path/to/iTunes/Music"

# Data sources for validation (in priority order)
sources:
  primary: musicbrainz
  fallback:
    - itunes        # iTunes Search API (free, no key required)
    - discogs
    - acoustid      # Audio fingerprinting for unknown tracks

# Audio fingerprinting (for unknown/doubtful tracks)
fingerprinting:
  enabled: true
  provider: acoustid
  chromaprint_path: null    # Auto-detect fpcalc, or specify path
  confidence_threshold: 0.85
  use_for:
    - unknown_tracks        # No metadata at all
    - low_confidence        # Metadata confidence < 70%
    - mismatch_detected     # Local vs remote don't match

# API settings
api:
  musicbrainz:
    rate_limit: 1.0         # seconds between requests
    user_agent: "MusicCleanup/1.0"

  itunes:
    rate_limit: 0.05        # 20 requests per second allowed
    country: "us"

  acoustid:
    rate_limit: 0.33        # 3 requests per second max

  discogs:
    rate_limit: 1.0

# Confidence thresholds for auto-processing
thresholds:
  auto_approve: 0.95        # >= 95% = auto-apply
  review_required: 0.70     # 70-95% = needs review
  auto_reject: 0.70         # < 70% = likely wrong match

# Naming conventions
naming:
  subtitle_separator: " - "
  artist_separator: " - "
  replace_colon_with: " -"
  max_path_length: 250
  remove_characters: ['?', '*', '<', '>', '|', '"']
  disc_format: "[Disc {n}]"

# Genre standardization
genres:
  enabled: true
  mapping:
    "Alternative Rock": "Rock"
    "Electronica": "Electronic"
    "Dance & Electronic": "Electronic"
    "R&B/Soul": "R&B"
  flag_for_review:
    - "Other"
    - "Unknown"
    - ""

# Cover art settings
cover_art:
  min_resolution: 500
  preferred_resolution: 1000
  format: "jpeg"
  quality: 95
  embed_in_files: true
  also_save_folder_jpg: true
  folder_jpg_name: "folder.jpg"

# Optional AI "second opinion" on cover art (visual cover-match).
# The deterministic cover checks in utilities/core/ are always-on and do NOT
# depend on this block. This is an OPTIONAL, pluggable layer. The default is
# zero-AI and zero-network: enabled: false + provider: null (NullValidator),
# which abstains on every album and never touches the network.
# See docs/AI_VALIDATORS.md to bring your own validator.
ai_validation:
  enabled: false             # master switch; false = NullValidator (no AI, no network)
  provider: null             # null | ollama | openai_compat | anthropic | hermes | <contrib name>
  endpoint: ""               # provider URL (e.g. http://localhost:11434 for ollama)
  model: ""                  # vision model name (provider-specific default if blank)
  checks:
    cover_visual_match: true # ask the validator whether art matches the album
  fail_mode: soft            # soft = log AI errors and continue; hard = re-raise
  timeout: 60                # seconds per request

# Multi-disc handling
multi_disc:
  consolidate: true
  metadata_only: true
  preserve_originals: true

# Processing options
processing:
  parallel_albums: 1
  checkpoint_interval: 10
  retry_on_network_error: 3

# Output settings
output:
  reports_path: "D:/music cleanup/outputs"
  logs_path: "D:/music cleanup/logs"
  state_path: "D:/music cleanup/state"
